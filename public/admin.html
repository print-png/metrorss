<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>metroRSS — админ</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --win-bg: #000000; --win-fg: #ffffff; --accent: #744da9; --ease-wp: cubic-bezier(0.1, 0.9, 0.2, 1); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--win-bg); color: var(--win-fg); font-family: 'Segoe WP', 'Segoe UI', sans-serif; padding: calc(40px + env(safe-area-inset-top, 0px)) 24px 40px 24px; }
        .page-header { margin-bottom: 35px; }
        .page-title { font-size: 54px; font-weight: 200; letter-spacing: -2px; display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
        .page-subtitle { font-size: 16px; color: var(--accent); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .back-link { color: var(--accent); text-decoration: none; font-size: 16px; font-weight: 400; text-transform: lowercase; border: 2px solid var(--accent); padding: 10px 16px; margin-top: -12px; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 8px; }
        .back-link:hover { color: white; background: var(--accent); }
        .login-box { border: 2px solid var(--accent); padding: 24px; background: #0a0a0a; max-width: 400px; margin: 0 auto; animation: wpListIn 0.5s var(--ease-wp) both; }
        .login-box h3 { font-size: 24px; font-weight: 200; text-transform: lowercase; margin-bottom: 15px; }
        .login-box input { display: block; width: 100%; margin-bottom: 15px; background: #111; color: #fff; border: 2px solid #444; padding: 12px; font-size: 16px; font-family: inherit; font-weight: 300; transition: border-color 0.2s; user-select: text; }
        .login-box input:focus { outline: none; border-color: var(--win-fg); }
        .login-btn { background: var(--accent); border: 2px solid var(--accent); color: white; padding: 10px 25px; font-size: 15px; font-weight: 400; cursor: pointer; text-transform: lowercase; transition: all 0.15s ease; }
        .login-btn:hover { background: transparent; color: var(--accent); }
        .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .login-error { color: #e51400; font-size: 13px; margin-top: 10px; display: none; }
        .dashboard { display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 30px; }
        .stat-card { border: 2px solid var(--accent); padding: 20px; background: #0a0a0a; text-align: center; }
        .stat-card .num { font-size: 36px; font-weight: 200; color: var(--accent); }
        .stat-card .label { font-size: 13px; color: #999; text-transform: lowercase; margin-top: 6px; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: none; border: 2px solid #333; color: white; padding: 8px 18px; font-size: 14px; cursor: pointer; font-family: inherit; text-transform: lowercase; transition: all 0.2s; }
        .tab-btn:hover, .tab-btn.active { border-color: var(--accent); color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .post-item, .ban-item { border: 1px solid #222; padding: 14px; margin-bottom: 8px; background: #050505; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; animation: wpListIn 0.3s var(--ease-wp) both; }
        .post-item .info, .ban-item .info { flex: 1; }
        .post-item .title { font-size: 16px; font-weight: 300; color: var(--accent); }
        .post-item .meta { font-size: 12px; color: #666; margin-top: 4px; word-break: break-all; }
        .device-id { font-family: 'Consolas', monospace; font-size: 10px; color: #e3a87e; }
        .ban-item .ip { font-size: 14px; color: var(--accent); font-weight: 300; }
        .ban-item .reason { font-size: 12px; color: #999; margin-top: 4px; }
        .del-btn, .unban-btn { background: none; border: 1px solid #e51400; color: #e51400; padding: 4px 12px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .del-btn:hover, .unban-btn:hover { background: #e51400; color: white; }
        .ban-form { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .ban-form input { flex: 1; min-width: 120px; background: #111; color: #fff; border: 1px solid #333; padding: 8px 12px; font-size: 13px; font-family: inherit; user-select: text; }
        .ban-form input:focus { outline: none; border-color: var(--accent); }
        .ban-form button { background: var(--accent); border: none; color: white; padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 13px; text-transform: lowercase; }
        .loader { text-align: center; padding: 40px; color: #666; }
        @keyframes wpListIn { from { transform: translateX(50px) rotateY(-15deg); opacity: 0; } to { transform: translateX(0) rotateY(0deg); opacity: 1; } }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-subtitle">metroRSS</div>
        <div class="page-title">админ <a href="/" class="back-link"><i class="material-icons" style="font-size:18px;">arrow_back</i>назад</a></div>
    </div>

    <div class="login-box" id="login-box">
        <h3>вход</h3>
        <input id="login-pass" type="password" placeholder="пароль">
        <button class="login-btn" id="login-btn">войти</button>
        <div class="login-error" id="login-error"></div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="stats-grid" id="stats"></div>

        <div class="tab-bar">
            <button class="tab-btn active" data-tab="posts">посты</button>
            <button class="tab-btn" data-tab="bans">баны IP</button>
            <button class="tab-btn" data-tab="devices">баны device</button>
        </div>

        <div class="tab-content active" id="tab-posts">
            <div id="posts-list"></div>
        </div>

        <div class="tab-content" id="tab-bans">
            <div class="ban-form">
                <input id="ban-ip" placeholder="IP адрес">
                <input id="ban-reason" placeholder="причина (опционально)">
                <select id="ban-duration" style="background:#111;color:#fff;border:1px solid #333;padding:8px 12px;font-size:13px;font-family:inherit;min-width:80px;">
                    <option value="3600000">1 час</option>
                    <option value="21600000">6 часов</option>
                    <option value="86400000" selected>24 часа</option>
                    <option value="259200000">3 дня</option>
                    <option value="604800000">7 дней</option>
                    <option value="0">навсегда</option>
                </select>
                <button id="ban-btn">забанить</button>
            </div>
            <div id="bans-list"></div>
        </div>

        <div class="tab-content" id="tab-devices">
            <div class="ban-form">
                <input id="ban-device-id" placeholder="Device ID">
                <input id="ban-device-reason" placeholder="причина (опционально)">
                <select id="ban-device-duration" style="background:#111;color:#fff;border:1px solid #333;padding:8px 12px;font-size:13px;font-family:inherit;min-width:80px;">
                    <option value="3600000">1 час</option>
                    <option value="21600000">6 часов</option>
                    <option value="86400000" selected>24 часа</option>
                    <option value="259200000">3 дня</option>
                    <option value="604800000">7 дней</option>
                    <option value="0">навсегда</option>
                </select>
                <button id="ban-device-btn">забанить</button>
            </div>
            <div id="devices-list"></div>
            <p style="color:#555;font-size:12px;margin-top:12px;">узнать deviceId юзера: он возвращается в ответе при бане (403) или спроси у юзера — открой F12 → localStorage → ключ <code style="background:#111;padding:1px 4px;">_did</code><br>твой текущий deviceId: <span id="my-device-id" style="color:var(--accent);font-size:11px;"></span></p>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('adminToken');

        function api(path, opts = {}) {
            opts.headers = opts.headers || {};
            opts.headers['Authorization'] = 'Bearer ' + token;
            opts.headers['X-Device-ID'] = getMyDeviceId();
            return fetch(path, opts).then(r => { if (!r.ok) throw new Error(); return r.json(); });
        }

        if (token) {
            api('/api/admin/stats').then(() => {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadStats(); loadPosts(); loadBans(); loadDeviceBans();
            }).catch(() => {
                localStorage.removeItem('adminToken');
                token = '';
            });
        }

        document.getElementById('login-btn').addEventListener('click', login);
        document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

        function login() {
            const pass = document.getElementById('login-pass').value;
            if (!pass) return;
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'проверка...';

            fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            })
            .then(r => r.json().then(data => ({ status: r.status, data })))
            .then(({ status, data }) => {
                btn.disabled = false;
                btn.textContent = 'войти';

                if (status === 429) {
                    document.getElementById('login-error').textContent = data.error;
                    document.getElementById('login-error').style.display = 'block';
                    return;
                }

                if (status !== 200) {
                    document.getElementById('login-error').textContent = data.error || 'Ошибка';
                    document.getElementById('login-error').style.display = 'block';
                    return;
                }

                token = data.token;
                localStorage.setItem('adminToken', token);
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadStats(); loadPosts(); loadBans(); loadDeviceBans();
            })
            .catch(() => {
                btn.disabled = false;
                btn.textContent = 'войти';
                document.getElementById('login-error').textContent = 'Ошибка соединения';
                document.getElementById('login-error').style.display = 'block';
            });
        }

        function loadStats() {
            api('/api/admin/stats').then(d => {
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><div class="num">${d.postsCount}</div><div class="label">постов</div></div>
                    <div class="stat-card"><div class="num">${d.totalLikes}</div><div class="label">лайков</div></div>
                    <div class="stat-card"><div class="num">${d.totalComments}</div><div class="label">комментариев</div></div>
                    <div class="stat-card"><div class="num">${d.bannedIPsCount}</div><div class="label">забанено IP</div></div>
                `;
            });
        }

        function loadPosts() {
            const el = document.getElementById('posts-list');
            el.innerHTML = '<div class="loader">загрузка...</div>';
            api('/api/admin/posts').then(posts => {
                if (!posts.length) { el.innerHTML = '<p style="color:#666;">постов нет</p>'; return; }
                el.innerHTML = posts.map(p => `
                    <div class="post-item">
                        <div class="info">
                            <div class="title">${p.title || 'без заголовка'}</div>
                            <div class="meta">${p.text}… &middot; ${new Date(p.date).toLocaleDateString('ru')} &middot; ❤ ${p.likes} &middot; 💬 ${p.commentsCount} ${p.ip ? ' &middot; 🌐 ' + p.ip : ''} ${p.deviceId ? ' <span class="device-id">📱 ' + p.deviceId + '</span>' : ''}</div>
                        </div>
                        <button class="del-btn" data-id="${p.id}">удалить</button>
                    </div>
                `).join('');
                el.querySelectorAll('.del-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (!confirm('Удалить пост?')) return;
                        api('/api/admin/posts/' + btn.dataset.id, { method: 'DELETE' }).then(() => { loadPosts(); loadStats(); });
                    });
                });
            }).catch(() => { el.innerHTML = '<p style="color:#e51400;">ошибка загрузки</p>'; });
        }

        function loadBans() {
            const el = document.getElementById('bans-list');
            el.innerHTML = '<div class="loader">загрузка...</div>';
            api('/api/admin/banned').then(bans => {
                const keys = Object.keys(bans);
                if (!keys.length) { el.innerHTML = '<p style="color:#666;">банов нет</p>'; return; }
                el.innerHTML = keys.map(ip => {
                    const b = bans[ip];
                    const untilStr = b.until && b.until !== Infinity ? 'до ' + new Date(b.until).toLocaleString('ru') : 'навсегда';
                    return `
                        <div class="ban-item">
                            <div class="info">
                                <div class="ip">${ip}</div>
                                <div class="reason">${b.reason || 'без причины'} &middot; ${untilStr}</div>
                            </div>
                            <button class="unban-btn" data-ip="${ip}">разбанить</button>
                        </div>
                    `;
                }).join('');
                el.querySelectorAll('.unban-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        api('/api/admin/ban/' + encodeURIComponent(btn.dataset.ip), { method: 'DELETE' }).then(() => { loadBans(); loadStats(); });
                    });
                });
            }).catch(() => { el.innerHTML = '<p style="color:#e51400;">ошибка загрузки</p>'; });
        }

        document.getElementById('ban-btn').addEventListener('click', () => {
            const ip = document.getElementById('ban-ip').value.trim();
            const reason = document.getElementById('ban-reason').value.trim();
            const dur = parseInt(document.getElementById('ban-duration').value);
            if (!ip) return;
            const until = dur > 0 ? Date.now() + dur : 0;
            api('/api/admin/ban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ip, reason, until }) })
                .then(() => { document.getElementById('ban-ip').value = ''; document.getElementById('ban-reason').value = ''; loadBans(); loadStats(); });
        });

        function loadDeviceBans() {
            const el = document.getElementById('devices-list');
            el.innerHTML = '<div class="loader">загрузка...</div>';
            api('/api/admin/banned-devices').then(devices => {
                const keys = Object.keys(devices);
                if (!keys.length) { el.innerHTML = '<p style="color:#666;">банов device нет</p>'; return; }
                el.innerHTML = keys.map(id => {
                    const b = devices[id];
                    const untilStr = b.until && b.until !== Infinity ? 'до ' + new Date(b.until).toLocaleString('ru') : 'навсегда';
                    return `
                        <div class="ban-item">
                            <div class="info">
                                <div class="ip" style="font-size:11px;word-break:break-all;">${id}</div>
                                <div class="reason">${b.reason || 'без причины'} &middot; ${untilStr}</div>
                            </div>
                            <button class="unban-btn" data-device="${id}">разбанить</button>
                        </div>
                    `;
                }).join('');
                el.querySelectorAll('.unban-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        api('/api/admin/ban-device/' + encodeURIComponent(btn.dataset.device), { method: 'DELETE' }).then(() => { loadDeviceBans(); loadStats(); });
                    });
                });
            }).catch(() => { el.innerHTML = '<p style="color:#e51400;">ошибка загрузки</p>'; });
        }

        function hashStr(s) {
            let h = 0;
            for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
            return Math.abs(h).toString(36);
        }
        function getCanvasFP() {
            try {
                const c = document.createElement('canvas');
                c.width = 256; c.height = 128;
                const ctx = c.getContext('2d');
                ctx.textBaseline = 'top'; ctx.font = '14px Arial';
                ctx.fillStyle = '#f60'; ctx.fillRect(10, 10, 60, 60);
                ctx.fillStyle = '#069'; ctx.fillText('metrorss', 5, 40);
                ctx.fillStyle = '#444'; ctx.font = '12px monospace';
                ctx.fillText(navigator.userAgent.slice(-8), 5, 70);
                return hashStr(c.toDataURL());
            } catch(e) { return ''; }
        }
        function getWebGLFP() {
            try {
                const c = document.createElement('canvas');
                const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
                if (!gl) return '';
                const ext = gl.getExtension('WEBGL_debug_renderer_info');
                if (!ext) return '';
                return hashStr(gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) + '|' + gl.getParameter(ext.UNMASKED_RENDERER_WEBGL));
            } catch(e) { return ''; }
        }
        function getAudioFP() {
            try {
                const ctx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
                const osc = ctx.createOscillator();
                osc.type = 'triangle'; osc.frequency.value = 1e4;
                const comp = ctx.createDynamicsCompressor();
                comp.threshold.value = -50; comp.knee.value = 40; comp.ratio.value = 12;
                osc.connect(comp); comp.connect(ctx.destination); osc.start(0);
                return ctx.startRendering().then(buf => hashStr(buf.getChannelData(0).slice(0, 1000).join('|'))).catch(() => '');
            } catch(e) { return Promise.resolve(''); }
        }
        function getExtraFP() {
            return [navigator.platform, navigator.hardwareConcurrency, navigator.deviceMemory || '', navigator.maxTouchPoints,
                (navigator.languages || []).join(','), getCanvasFP(), getWebGLFP()].join('|');
        }
        function getCookie(n) {
            const m = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
            return m ? m.pop() : '';
        }
        function setCookie(n, v, days) {
            const d = new Date(); d.setTime(d.getTime() + days * 864e5);
            document.cookie = n + '=' + v + '; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
        }
        function saveDeviceID(id) {
            try { localStorage.setItem('_did', id); } catch(e) {}
            try { sessionStorage.setItem('_did', id); } catch(e) {}
            try { setCookie('_did', id, 365); } catch(e) {}
            try {
                const req = indexedDB.open('_did_db', 1);
                req.onupgradeneeded = () => req.result.createObjectStore('d', { keyPath: 'k' });
                req.onsuccess = () => {
                    const tx = req.result.transaction('d', 'readwrite');
                    const store = tx.objectStore('d');
                    store.get('id').onsuccess = (e) => {
                        if (!e.target.result) store.put({ k: 'id', v: id });
                    };
                };
            } catch(e) {}
            getAudioFP().then(audioFP => {
                if (!audioFP) return;
                const enhanced = 'd_' + hashStr(id.slice(2) + '|' + audioFP);
                try { localStorage.setItem('_did_enh', enhanced); } catch(e) {}
            });
        }
        function getMyDeviceId() {
            try {
                let id = localStorage.getItem('_did') || sessionStorage.getItem('_did') || getCookie('_did');
                if (!id) {
                    const extra = getExtraFP();
                    const base = [navigator.userAgent, screen.width + 'x' + screen.height, screen.colorDepth, navigator.language, Intl.DateTimeFormat().resolvedOptions().timeZone].join('|');
                    id = 'd_' + hashStr(base + '|' + extra);
                }
                saveDeviceID(id);
                return id;
            } catch(e) { return 'ошибка'; }
        }
        document.getElementById('my-device-id').textContent = getMyDeviceId();

        document.getElementById('ban-device-btn').addEventListener('click', () => {
            const deviceId = document.getElementById('ban-device-id').value.trim();
            const reason = document.getElementById('ban-device-reason').value.trim();
            const dur = parseInt(document.getElementById('ban-device-duration').value);
            if (!deviceId) return;
            const until = dur > 0 ? Date.now() + dur : 0;
            api('/api/admin/ban-device', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ deviceId, reason, until }) })
                .then(() => { document.getElementById('ban-device-id').value = ''; document.getElementById('ban-device-reason').value = ''; loadDeviceBans(); loadStats(); });
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            });
        });
    </script>
</body>
</html>
