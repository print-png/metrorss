<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>metroRSS</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --win-bg: #000000;
            --win-fg: #ffffff;
            --accent: #744da9;
            --ease-wp: cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--win-bg); color: var(--win-fg); font-family: 'Segoe WP', 'Segoe UI', sans-serif; padding: calc(40px + env(safe-area-inset-top, 0px)) 24px 40px 24px; perspective: 1000px; }
        .page-header { margin-bottom: 35px; }
        .page-title { font-size: 54px; font-weight: 200; letter-spacing: -2px; opacity: 0.95; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .about-link { color: var(--accent); text-decoration: none; font-size: 16px; font-weight: 400; text-transform: lowercase; border: 2px solid var(--accent); padding: 8px 16px; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 8px; }
        .about-link:hover { color: white; background: var(--accent); }
        .page-subtitle { font-size: 16px; color: var(--accent); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .wp-box { border: 2px solid var(--accent); padding: 20px; margin-bottom: 40px; background: #0a0a0a; animation: wpListIn 0.5s var(--ease-wp) both; }
        .wp-box h3 { font-size: 24px; font-weight: 200; text-transform: lowercase; margin-bottom: 15px; }
        input, textarea { display: block; width: 100%; margin-bottom: 15px; background: #111111; color: #fff; border: 2px solid #444444; padding: 12px; font-size: 16px; font-family: inherit; font-weight: 300; transition: border-color 0.2s; user-select: text; }
        input:focus, textarea:focus { outline: none; border-color: var(--win-fg); }
        textarea { height: 160px; resize: vertical; }
        .wp-btn { background: var(--accent); border: 2px solid var(--accent); color: white; padding: 10px 25px; font-size: 15px; font-weight: 400; cursor: pointer; text-transform: lowercase; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 8px; }
        .wp-btn:hover { background: transparent; color: var(--accent); }
        .wp-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .feed-header { font-size: 32px; font-weight: 200; text-transform: lowercase; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        #feed { display: flex; flex-direction: column; gap: 12px; }
        .post { border: 2px solid #222; background: #050505; padding: 18px; animation: wpListIn 0.6s var(--ease-wp) both; }
        .post h2 { font-size: 22px; font-weight: 300; line-height: 1.2; text-transform: lowercase; color: var(--accent); margin-bottom: 8px; }
        .post p { font-size: 15px; font-weight: 300; color: #ccc; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .loader-gif { width: 30px; height: 30px; display: block; margin: 20px auto; }
        .bar { display: flex; gap: 16px; margin-top: 12px; border-top: 1px solid #222; padding-top: 10px; }
        .like-btn, .cmt-btn { background: none; border: 1px solid #333; color: #fff; padding: 4px 12px; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; transition: all 0.2s; }
        .like-btn:hover, .cmt-btn:hover { border-color: var(--accent); color: var(--accent); }
        .like-btn.liked { border-color: var(--accent); color: var(--accent); animation: pulse 0.3s ease; }
        .like-btn .material-icons, .cmt-btn .material-icons { font-size: 16px; }
        .lc { min-width: 12px; text-align: left; }
        .comments { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .comments.open { max-height: 500px; overflow-y: auto; margin-top: 10px; }
        .c { font-size: 13px; color: #999; padding: 4px 0; border-bottom: 1px solid #181818; }
        .cd { color: #555; margin-right: 8px; font-size: 11px; }
        .cmt-form { display: flex; gap: 6px; margin-top: 8px; }
        .cmt-input { flex: 1; display: block; background: #111; color: #fff; border: 1px solid #333; padding: 4px 10px; font-size: 13px; font-family: inherit; user-select: text; }
        .cmt-input:focus { outline: none; border-color: var(--accent); }
        .cmt-send { background: var(--accent); border: none; color: #fff; padding: 2px 6px; cursor: pointer; display: flex; align-items: center; }
        .cmt-send .material-icons { font-size: 14px; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        @keyframes wpListIn { from { transform: translateX(50px) rotateY(-15deg); opacity: 0; } to { transform: translateX(0) rotateY(0deg); opacity: 1; } }
        .post.no-anim { animation: none; }
        .emergency-banner { border: 2px solid #e51400; padding: 16px; margin-bottom: 20px; background: #0a0505; animation: wpListIn 0.5s var(--ease-wp) both; display: none; }
        .emergency-banner .label { color: #e51400; font-size: 11px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .emergency-banner .text { color: #fff; font-size: 15px; font-weight: 300; margin-top: 6px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .tab-bar { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #222; }
        .tab-btn { background: none; border: none; color: #666; padding: 10px 20px; font-size: 15px; font-family: inherit; font-weight: 300; cursor: pointer; text-transform: lowercase; transition: all 0.2s; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab-btn:hover { color: #aaa; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-subtitle">создай свою новость)</div>
        <div class="page-title">metroRSS<a href="/help.html" class="about-link">что это?</a></div>
    </div>
    <div class="wp-box">
        <h3>создать новость</h3>
        <input id="t" placeholder="заголовок новости">
        <textarea id="d" placeholder="текст новости (поддерживает базовый html: <p>, <b>, <i>)"></textarea>
        <button class="wp-btn" id="submit-btn">
            <i class="material-icons" style="font-size: 18px;">send</i> опубликовать
        </button>
    </div>
    <div class="emergency-banner" id="emergency-banner">
        <div class="label">📢 экстренная новость</div>
        <div class="text" id="emergency-text"></div>
    </div>
    <div class="tab-bar">
        <button class="tab-btn active" data-feed="all">все</button>
        <button class="tab-btn" data-feed="liked">мои лайки</button>
    </div>
    <div id="feed"></div>
    <script src="/script.js"></script>
</body>
</html>
